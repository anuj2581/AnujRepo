name: Build and Deploy to AKS

on:
  push:
    branches:
      - master

env:
  ACR_NAME: xublimeregistry
  IMAGE_NAME: mywebapp
  RESOURCE_GROUP: az204-rgram
  CLUSTER_NAME: xublime-aks

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ⭐ Build Docker Image
    - name: Build and Push Image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker buildx build \
        --platform linux/arm64 \
        -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG \
        --push .

    # ⭐ Connect AKS
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
        --resource-group $RESOURCE_GROUP \
        --name $CLUSTER_NAME \
        --overwrite-existing

    # ⭐ Deploy new version
    - name: Deploy to AKS
      run: |
        IMAGE_TAG=${{ github.sha }}
        kubectl set image deployment/mywebapp \
        mywebapp=$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG

        kubectl rollout status deployment/mywebapp
